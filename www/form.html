<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Formulário</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 40px; line-height: 1.4; }
    h1 { margin-bottom: 16px; }
    form { max-width: 420px; }
    label { display: block; margin: 12px 0 6px; }
    input { width: 100%; padding: 10px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 14px; cursor: pointer; }
    .links { margin-top: 18px; }
  </style>
</head>
<body>
  <h1>Formulário</h1>

  <!--
    Nota:
    - Isto redireciona para uma página estática (form-result.html) via GET.
    - Os valores do formulário serão enviados como query string:
      /form-result.html?name=...&age=...
  -->
  <form action="/form-result.html" method="get">
    <label for="name">Nome</label>
    <input id="name" name="name" type="text" placeholder="Escreve o teu nome" required />

    <label for="age">Idade</label>
    <input id="age" name="age" type="number" min="0" step="1" placeholder="Ex: 20" required />

    <button type="submit">Submeter</button>
  </form>

  <div class="links">
    <a href="/">Voltar ao início</a>
  </div>
</body>
</html>
