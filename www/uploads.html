<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Uploads</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 40px; line-height: 1.4; }
    h1 { margin-bottom: 10px; }
    .hint { color: #555; margin-bottom: 18px; }
    ul { padding-left: 18px; }
    li { margin: 10px 0; }
    .file { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .thumb { width: 80px; height: 60px; object-fit: cover; border: 1px solid #ddd; border-radius: 4px; }
    .error { padding: 10px 12px; border-radius: 6px; background: #ffecec; border: 1px solid #c0392b; }
    .links { margin-top: 18px; }
    code { background: #f3f3f3; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Uploads</h1>
  <p class="hint">A lista abaixo é gerada a partir do autoindex em <code>/uploads/</code>.</p>

  <div id="status">A carregar...</div>
  <ul id="list" style="display:none;"></ul>

  <div class="links">
    <a href="/upload">Ir para upload</a> |
    <a href="/">Voltar ao início</a>
  </div>

  <script>
    (function () {
      const STATUS = document.getElementById("status");
      const LIST = document.getElementById("list");

      function isImage(name) {
        return /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(name);
      }

      // Normaliza hrefs do autoindex para nomes de ficheiro
      function toFileName(href) {
        try {
          const u = new URL(href, window.location.origin);
          // esperamos algo como /uploads/ficheiro.ext
          const parts = u.pathname.split("/").filter(Boolean);
          return parts[parts.length - 1] || "";
        } catch {
          return "";
        }
      }

      async function load() {
        try {
          // Importante: usar /uploads/ (com slash final)
          const res = await fetch("/uploads/", { method: "GET" });
          if (!res.ok) throw new Error("HTTP " + res.status);

          const html = await res.text();
          const doc = new DOMParser().parseFromString(html, "text/html");

          // Muitos autoindex usam <a href="...">; vamos buscar todos.
          const anchors = Array.from(doc.querySelectorAll("a[href]"));

          // Extrair nomes de ficheiros e filtrar entradas "Parent Directory" e pastas
          const files = anchors
            .map(a => ({ text: (a.textContent || "").trim(), href: a.getAttribute("href") }))
            .filter(x => x.href && x.text && !/parent directory/i.test(x.text))
            .map(x => {
              // href pode ser relativo (ex: "a.txt") ou absoluto
              const fileName = toFileName(x.href) || x.text;
              return fileName;
            })
            .filter(name => name && name !== "uploads" && name !== "." && name !== "..")
            // elimina "subpastas" típicas com trailing slash
            .filter(name => !name.endsWith("/"));

          // Remover duplicados
          const unique = Array.from(new Set(files)).sort((a, b) => a.localeCompare(b));

          if (unique.length === 0) {
            STATUS.textContent = "Sem ficheiros em www/uploads (ou o autoindex não devolveu links).";
            LIST.style.display = "none";
            return;
          }

          // Render
          LIST.innerHTML = "";
          unique.forEach((name) => {
            const url = "/uploads/" + encodeURIComponent(name);

            const li = document.createElement("li");
            const wrap = document.createElement("div");
            wrap.className = "file";

            if (isImage(name)) {
              const img = document.createElement("img");
              img.className = "thumb";
              img.alt = name;
              img.src = url;
              wrap.appendChild(img);
            }

            const a = document.createElement("a");
            a.href = url;
            a.textContent = name;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            wrap.appendChild(a);

            li.appendChild(wrap);
            LIST.appendChild(li);
          });

          STATUS.textContent = "Ficheiros encontrados: " + unique.length;
          LIST.style.display = "block";
        } catch (e) {
          STATUS.className = "error";
          STATUS.textContent =
            "Não foi possível carregar /uploads/. " +
            "Confirma que o autoindex está ativo e que /uploads/ devolve HTML de listagem. (" + e.message + ")";
          LIST.style.display = "none";
        }
      }

      load();
    })();
  </script>
</body>
</html>
