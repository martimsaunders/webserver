server {
    listen 8002;
    host 127.0.0.1;
    root inc;
    # client_max_body_size 3000000;
	index index.html;
    error_page 404 error_pages/404.html;

    location / {
        allow_methods  DELETE POST GET;
        autoindex off;
    }
    
    location /ConfigParsing {
        autoindex on;
        index tours1.html;
        allow_methods GET POST;
    }

	location /InconFile{
		return 301 /tours;
	}

    location /ola {
        root ./;
        allow_methods GET POST DELETE;
        index time.py;
        cgi .py /usr/bin/python3;
    }
}


