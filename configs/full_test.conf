server {
    listen 8080;
    host 127.0.0.1;
    root www;
    index index.html;
    client_max_body_size 10485760;

    error_page 403 error_pages/403.html;
    error_page 404 error_pages/404.html;
    error_page 405 error_pages/405.html;
    error_page 500 error_pages/500.html;

    location / {
        allow_methods GET;
        autoindex off;
        index index.html;
    }

    location /static {
        allow_methods GET;
        root www;
        autoindex on;
        index index.html;
    }

    location /upload {
        allow_methods GET POST;
        root www;
        autoindex off;
        index index.html;
        upload on;
        upload_store www/uploads;
    }

    location /delete {
        allow_methods GET DELETE;
        root www/uploads;
        autoindex on;
    }

    location /redirect {
        return 302 /;
    }

    location /cgi-bin {
        allow_methods GET POST;
        root cgi-bin;
        cgi .py /usr/bin/python3;
    }
}
