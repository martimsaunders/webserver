server {
    listen 80;
    host localhost;

    # ROOT default (para /)
    root ./www;
    index index.html;

    # / must answer to GET request ONLY
    location / {
        allow_methods GET;
    }

    # Any file with .bla as extension must answer to POST request by calling the cgi_test executable
    # (assumindo que o teu webserv mapeia extensão->cgi)
    location ~ \.bla$ {
        allow_methods POST;
        cgi_pass ./cgi_test;
        # ou se o teu parser usar outra keyword:
        # cgi_path ./cgi_test;
    }

    # /post_body must answer anything to POST request with a maxBody of 100
    location /post_body {
        allow_methods POST;
        client_max_body_size 100;
        # pode responder com 200 OK e uma mensagem simples
        # (se o teu webserv precisar de root específico)
        root ./www;
    }

    # /directory/ must answer to GET request and the root of it would be the repository YoupiBanane
    # and if no file are requested, it should search for youpi.bad_extension files
    location /directory/ {
        allow_methods GET;
        root ./YoupiBanane;
        index youpi.bad_extension;
        autoindex off;
    }

    # Opcional: páginas de erro
    error_page 404 ./www/404.html;
    error_page 403 ./www/403.html;
    error_page 405 ./www/405.html;
    error_page 500 ./www/500.html;
}